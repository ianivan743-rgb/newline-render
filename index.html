<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>换行渲染工具（\\r\\n → 换行）</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; margin: 16px; }
    .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .panel { display: flex; flex-direction: column; min-height: 70vh; }
    .title { font-weight: 600; margin: 0 0 8px; }
    textarea {
      width: 100%; height: 100%;
      resize: vertical;
      font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      font-size: 13px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      line-height: 1.4;
    }
    .output {
      width: 100%; height: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fafafa;
      overflow: auto;
      white-space: pre-wrap;      /* 关键：保留换行并自动换行 */
      word-break: break-word;
      font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      font-size: 13px;
      line-height: 1.4;
      box-sizing: border-box;
    }
    .toolbar { margin: 0 0 10px; display: flex; gap: 8px; align-items: center; }
    button { padding: 6px 10px; border: 1px solid #bbb; background: white; border-radius: 8px; cursor: pointer; }
    button:hover { background: #f3f3f3; }
    .hint { color: #666; font-size: 12px; }
    @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } .panel { min-height: 40vh; } }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="btnClear">清空</button>
    <button id="btnSample">填充示例</button>
    <span class="hint">左侧支持粘贴包含“\\r\\n / \\n / \\r”的文本；右侧实时渲染为真正换行</span>
  </div>

  <div class="wrap">
    <div class="panel">
      <div class="title">原始文本（含 \\r\\n 等字面量）</div>
      <textarea id="raw" placeholder="在这里粘贴，例如：\r\n第一行\r\n第二行"></textarea>
    </div>

    <div class="panel">
      <div class="title">渲染结果（真实换行显示）</div>
      <div id="out" class="output"></div>
    </div>
  </div>

  <script>
    function renderNewlines(text) {
      if (text == null) return "";
      let s = String(text);

      // 把“字面量转义换行”渲染成真实换行
      s = s.replaceAll("\\r\\n", "\n")
           .replaceAll("\\n", "\n")
           .replaceAll("\\r", "\n");

      // 同时兼容原本就是真实的 Windows/Mac 换行
      s = s.replaceAll("\r\n", "\n").replaceAll("\r", "\n");

      // 去掉开头多余空行（不需要可删除下一行）
      s = s.replace(/^\n+/, "");

      return s;
    }

    const rawEl = document.getElementById("raw");
    const outEl = document.getElementById("out");
    const btnClear = document.getElementById("btnClear");
    const btnSample = document.getElementById("btnSample");

    function update() {
      outEl.textContent = renderNewlines(rawEl.value);
    }

    rawEl.addEventListener("input", update);

    btnClear.addEventListener("click", () => {
      rawEl.value = "";
      update();
      rawEl.focus();
    });

    btnSample.addEventListener("click", () => {
      rawEl.value = String.raw`\r\nvisit_id: 40399510\r\n性别: 男\r\n年龄: 12\r\n科室: 骨外科门诊\r\n诊断结论: 腹痛`;
      update();
      rawEl.focus();
    });

    update();
  </script>
</body>
</html>
