<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文本工具：换行渲染 + JSON解析</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; margin: 16px; }
    .toolbar { margin: 0 0 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button { padding: 6px 10px; border: 1px solid #bbb; background: white; border-radius: 8px; cursor: pointer; }
    button:hover { background: #f3f3f3; }
    .hint { color: #666; font-size: 12px; }
    .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .panel { display: flex; flex-direction: column; min-height: 72vh; }
    .title { font-weight: 600; margin: 0 0 8px; display:flex; align-items:center; justify-content:space-between; gap: 8px;}
    textarea {
      width: 100%; height: 100%;
      resize: vertical;
      font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      font-size: 13px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      line-height: 1.4;
    }
    .output {
      width: 100%; height: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fafafa;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      font-size: 13px;
      line-height: 1.4;
      box-sizing: border-box;
    }
    .tabs { display: flex; gap: 6px; }
    .tab {
      border: 1px solid #bbb;
      background: white;
      padding: 4px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      user-select: none;
    }
    .tab.active { background: #111; color: #fff; border-color: #111; }
    .badge { font-size: 12px; color: #666; }
    .error { color: #b00020; white-space: pre-wrap; }
    @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } .panel { min-height: 42vh; } }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="btnClear">清空</button>
    <button id="btnSampleText">填充示例（换行）</button>
    <button id="btnSampleJsonObj">填充示例（JSON对象）</button>
    <button id="btnSampleJsonArr">填充示例（JSON数组）</button>
    <button id="btnCopyRight">复制右侧内容</button>
    <span class="hint">JSON模式支持：对象 {...}、数组 [...]、以及“杂文本夹 JSON”。</span>
  </div>

  <div class="wrap">
    <div class="panel">
      <div class="title">
        <span>原始文本</span>
        <span class="badge" id="rawInfo"></span>
      </div>
      <textarea id="raw" placeholder="粘贴文本或JSON，例如：\r\n第一行\r\n第二行 或  [{&quot;a&quot;:1}]"></textarea>
    </div>

    <div class="panel">
      <div class="title">
        <span>结果</span>
        <div class="tabs">
          <div class="tab active" data-mode="nl">换行渲染</div>
          <div class="tab" data-mode="json">JSON解析</div>
        </div>
      </div>
      <div id="out" class="output"></div>
    </div>
  </div>

<script>
  const rawEl = document.getElementById("raw");
  const outEl = document.getElementById("out");
  const rawInfo = document.getElementById("rawInfo");
  const btnClear = document.getElementById("btnClear");
  const btnSampleText = document.getElementById("btnSampleText");
  const btnSampleJsonObj = document.getElementById("btnSampleJsonObj");
  const btnSampleJsonArr = document.getElementById("btnSampleJsonArr");
  const btnCopyRight = document.getElementById("btnCopyRight");
  const tabs = document.querySelectorAll(".tab");
  let mode = "nl";

  function renderNewlines(text) {
    if (text == null) return "";
    let s = String(text);
    s = s.replaceAll("\\r\\n", "\n").replaceAll("\\n", "\n").replaceAll("\\r", "\n");
    s = s.replaceAll("\r\n", "\n").replaceAll("\r", "\n");
    s = s.replace(/^\n+/, "");
    return s;
  }

  function stripMarkdownCodeFence(s) {
    s = String(s ?? "").trim();
    if (s.startsWith("```")) {
      s = s.replace(/^```[a-zA-Z0-9_-]*\s*\n?/, "");
      s = s.replace(/\n?```$/, "");
    }
    return s.trim();
  }

  // 提取第一个 JSON（对象/数组），按括号配对，跳过字符串内容
  function extractFirstJsonByBrackets(s) {
    const n = s.length;
    let start = -1;
    for (let i = 0; i < n; i++) {
      const ch = s[i];
      if (ch === "{" || ch === "[") { start = i; break; }
    }
    if (start === -1) return null;

    const open = s[start];
    const close = open === "{" ? "}" : "]";
    let depth = 0, inStr = false, quote = "", escape = false;

    for (let i = start; i < n; i++) {
      const ch = s[i];

      if (inStr) {
        if (escape) { escape = false; continue; }
        if (ch === "\\") { escape = true; continue; }
        if (ch === quote) { inStr = false; quote = ""; continue; }
        continue;
      } else {
        if (ch === '"') { inStr = true; quote = ch; continue; } // JSON标准仅双引号
        if (ch === open) depth++;
        if (ch === close) {
          depth--;
          if (depth === 0) return s.slice(start, i + 1).trim();
        }
      }
    }
    return null;
  }

  // 关键：把 JSON 字符串值中的真实控制字符（\n \r \t）转义掉，避免 Bad control character
  function escapeControlCharsInsideJsonStrings(jsonText) {
    let out = "";
    let inStr = false;
    let escape = false;

    for (let i = 0; i < jsonText.length; i++) {
      const ch = jsonText[i];

      if (!inStr) {
        if (ch === '"') inStr = true;
        out += ch;
        continue;
      }

      // inStr === true
      if (escape) {
        // 当前字符是被转义的，原样保留
        out += ch;
        escape = false;
        continue;
      }

      if (ch === "\\") {
        out += ch;
        escape = true;
        continue;
      }

      if (ch === '"') {
        out += ch;
        inStr = false;
        continue;
      }

      // 字符串内部遇到真实控制字符 -> 转义
      if (ch === "\n") { out += "\\n"; continue; }
      if (ch === "\r") { out += "\\r"; continue; }
      if (ch === "\t") { out += "\\t"; continue; }

      out += ch;
    }

    return out;
  }

  function tryParseJson(text) {
    let s = renderNewlines(text);
    s = stripMarkdownCodeFence(s);

    // 1) 直接 parse
    try {
      return { ok: true, value: JSON.parse(s), source: "direct" };
    } catch (e1) {
      // 2) 直接失败：尝试“字符串内控制字符转义”再 parse
      try {
        const fixed = escapeControlCharsInsideJsonStrings(s);
        return { ok: true, value: JSON.parse(fixed), source: "direct+escape" };
      } catch (e1b) {}
    }

    // 3) 抽取片段再 parse
    const cand = extractFirstJsonByBrackets(s);
    if (!cand) return { ok: false, error: new Error("未找到可解析的 JSON（没有 { 或 [ ）") };

    try {
      return { ok: true, value: JSON.parse(cand), source: "extracted" };
    } catch (e2) {
      // 4) 抽取片段失败：再做一次控制字符转义
      try {
        const fixedCand = escapeControlCharsInsideJsonStrings(cand);
        return { ok: true, value: JSON.parse(fixedCand), source: "extracted+escape" };
      } catch (e2b) {
        return { ok: false, error: e2b, candidate: cand };
      }
    }
  }

  function describeJson(val) {
    if (Array.isArray(val)) return `type: Array, length: ${val.length}`;
    if (val !== null && typeof val === "object") return `type: Object`;
    return `type: ${typeof val}`;
  }

  function update() {
    const raw = rawEl.value ?? "";
    rawInfo.textContent = `字符数：${raw.length}`;

    if (mode === "nl") {
      outEl.innerHTML = "";
      outEl.textContent = renderNewlines(raw);
      return;
    }

    const res = tryParseJson(raw);
    if (!res.ok) {
      outEl.innerHTML =
        `<div class="error">JSON 解析失败：${String(res.error)}`
        + (res.candidate ? `\n\n候选片段(截取)：\n${res.candidate}` : "")
        + `</div>`;
      return;
    }

    outEl.textContent =
      JSON.stringify(res.value, null, 2)
      + `\n\n/* ${describeJson(res.value)}, source: ${res.source} */`;
  }

  rawEl.addEventListener("input", update);

  tabs.forEach(t => {
    t.addEventListener("click", () => {
      tabs.forEach(x => x.classList.remove("active"));
      t.classList.add("active");
      mode = t.dataset.mode;
      update();
    });
  });

  btnClear.addEventListener("click", () => { rawEl.value = ""; update(); rawEl.focus(); });

  btnSampleText.addEventListener("click", () => {
    rawEl.value = String.raw`\r\nvisit_id: 40399510\r\n性别: 男\r\n年龄: 12\r\n科室: 骨外科门诊\r\n诊断结论: 腹痛`;
    update(); rawEl.focus();
  });

  btnSampleJsonObj.addEventListener("click", () => {
    rawEl.value =
`{
  "uniq_pid": "P001",
  "uniq_vid": "V001",
  "summary": "患者因【腹痛】于【2024年02月01日】在【门诊】就诊，最终诊断为【急性胃炎|胃食管反流】。"
}`;
    update(); rawEl.focus();
  });

  btnSampleJsonArr.addEventListener("click", () => {
    rawEl.value =
`[
  {"name": "肺癌", "time": "2018-06-28 15:26:10", "type": "门诊诊断"},
  {"name": "阻塞性肺气肿", "code": "J43.904", "time": "2018-06-28 16:16:08", "type": "门诊诊断"}
]`;
    update(); rawEl.focus();
  });

  btnCopyRight.addEventListener("click", async () => {
    const txt = outEl.textContent || "";
    try {
      await navigator.clipboard.writeText(txt);
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = txt;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }
  });

  update();
</script>
</body>
</html>
