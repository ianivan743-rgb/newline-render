<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文本工具：换行渲染 + JSON解析</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; margin: 16px; }
    .toolbar { margin: 0 0 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button { padding: 6px 10px; border: 1px solid #bbb; background: white; border-radius: 8px; cursor: pointer; }
    button:hover { background: #f3f3f3; }
    .hint { color: #666; font-size: 12px; }
    .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .panel { display: flex; flex-direction: column; min-height: 72vh; }
    .title { font-weight: 600; margin: 0 0 8px; display:flex; align-items:center; justify-content:space-between; gap: 8px;}
    textarea {
      width: 100%; height: 100%;
      resize: vertical;
      font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      font-size: 13px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      line-height: 1.4;
    }
    .output {
      width: 100%; height: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fafafa;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      font-size: 13px;
      line-height: 1.4;
      box-sizing: border-box;
    }
    .tabs { display: flex; gap: 6px; }
    .tab {
      border: 1px solid #bbb;
      background: white;
      padding: 4px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      user-select: none;
    }
    .tab.active { background: #111; color: #fff; border-color: #111; }
    .badge { font-size: 12px; color: #666; }
    .error { color: #b00020; white-space: pre-wrap; }
    @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } .panel { min-height: 42vh; } }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="btnClear">清空</button>
    <button id="btnSampleText">填充示例（换行）</button>
    <button id="btnSampleJsonObj">填充示例（JSON对象）</button>
    <button id="btnSampleJsonArr">填充示例（JSON数组）</button>
    <button id="btnCopyRight">复制右侧内容</button>
    <span class="hint">JSON模式支持：对象 {...}、数组 [...]、以及"杂文本夹 JSON"。</span>
  </div>

  <div class="wrap">
    <div class="panel">
      <div class="title">
        <span>原始文本</span>
        <span class="badge" id="rawInfo"></span>
      </div>
      <textarea id="raw" placeholder="粘贴文本或JSON，例如：\r\n第一行\r\n第二行 或  [{&quot;a&quot;:1}]"></textarea>
    </div>

    <div class="panel">
      <div class="title">
        <span>结果</span>
        <div class="tabs">
          <div class="tab active" data-mode="nl">换行渲染</div>
          <div class="tab" data-mode="json">JSON解析</div>
        </div>
      </div>
      <div id="out" class="output"></div>
    </div>
  </div>

<script>
  const rawEl = document.getElementById("raw");
  const outEl = document.getElementById("out");
  const rawInfo = document.getElementById("rawInfo");
  const btnClear = document.getElementById("btnClear");
  const btnSampleText = document.getElementById("btnSampleText");
  const btnSampleJsonObj = document.getElementById("btnSampleJsonObj");
  const btnSampleJsonArr = document.getElementById("btnSampleJsonArr");
  const btnCopyRight = document.getElementById("btnCopyRight");
  const tabs = document.querySelectorAll(".tab");
  let mode = "nl";

  // ============= 0) 历史记录 UI 注入 =============
  const toolbar = document.querySelector(".toolbar");
  const historyWrap = document.createElement("div");
  historyWrap.style.width = "100%";
  historyWrap.style.marginTop = "8px";
  historyWrap.innerHTML = `
    <div style="display:flex; gap:8px; align-items:center; justify-content:space-between; flex-wrap:wrap;">
      <div class="hint">往期数据（保存15天，保存在本机浏览器localStorage）：</div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button id="btnToggleHistory">展开/收起</button>
        <button id="btnClearHistory">清空往期</button>
      </div>
    </div>
    <div id="historyPanel" style="margin-top:8px; display:none; border:1px solid #ddd; border-radius:8px; padding:8px; background:#fff; max-height:220px; overflow:auto;"></div>
  `;
  toolbar.after(historyWrap);

  const btnToggleHistory = document.getElementById("btnToggleHistory");
  const btnClearHistory = document.getElementById("btnClearHistory");
  const historyPanel = document.getElementById("historyPanel");

  // ============= 1) 基础：换行渲染 / JSON抽取解析 ==============
  function renderNewlines(text) {
    if (text == null) return "";
    let s = String(text);
    s = s.replaceAll("\\t", "").replaceAll("\t", "");
    s = s.replaceAll("\\r\\n", "\n").replaceAll("\\n", "\n").replaceAll("\\r", "\n");
    s = s.replaceAll("\r\n", "\n").replaceAll("\r", "\n");
    s = s.replace(/^\n+/, "");
    // 把"只含空白字符的行"变成空行
    s = s.replace(/^[ \t]+$/mg, "");
    // 压缩连续3个及以上换行为最多2个
    s = s.replace(/\n{3,}/g, "\n\n");
    return s;
  }

  function stripMarkdownCodeFence(s) {
    s = String(s ?? "").trim();
    if (s.startsWith("```")) {
      s = s.replace(/^```[a-zA-Z0-9_-]*\s*\n?/, "");
      s = s.replace(/\n?```$/, "");
    }
    return s.trim();
  }

  function extractFirstJsonByBrackets(s) {
    const n = s.length;
    let start = -1;
    for (let i = 0; i < n; i++) {
      const ch = s[i];
      if (ch === "{" || ch === "[") { start = i; break; }
    }
    if (start === -1) return null;

    const open = s[start];
    const close = open === "{" ? "}" : "]";
    let depth = 0, inStr = false, quote = "", escape = false;

    for (let i = start; i < n; i++) {
      const ch = s[i];
      if (inStr) {
        if (escape) { escape = false; continue; }
        if (ch === "\\") { escape = true; continue; }
        if (ch === quote) { inStr = false; quote = ""; continue; }
        continue;
      } else {
        if (ch === '"') { inStr = true; quote = ch; continue; }
        if (ch === open) depth++;
        if (ch === close) {
          depth--;
          if (depth === 0) return s.slice(start, i + 1).trim();
        }
      }
    }
    return null;
  }

  function escapeControlCharsInsideJsonStrings(jsonText) {
    let out = "";
    let inStr = false;
    let escape = false;
    for (let i = 0; i < jsonText.length; i++) {
      const ch = jsonText[i];
      if (!inStr) {
        if (ch === '"') inStr = true;
        out += ch;
        continue;
      }
      if (escape) { out += ch; escape = false; continue; }
      if (ch === "\\") { out += ch; escape = true; continue; }
      if (ch === '"') { out += ch; inStr = false; continue; }
      if (ch === "\n") { out += "\\n"; continue; }
      if (ch === "\r") { out += "\\r"; continue; }
      if (ch === "\t") { out += "\\t"; continue; }
      out += ch;
    }
    return out;
  }

  function tryParseJson(text) {
    let s = renderNewlines(text);
    s = stripMarkdownCodeFence(s);
    try {
      return { ok: true, value: JSON.parse(s), source: "direct", jsonTextUsed: s };
    } catch (e1) {
      try {
        const fixed = escapeControlCharsInsideJsonStrings(s);
        return { ok: true, value: JSON.parse(fixed), source: "direct+escape", jsonTextUsed: fixed };
      } catch (e1b) {}
    }
    const cand = extractFirstJsonByBrackets(s);
    if (!cand) return { ok: false, error: new Error("未找到可解析的 JSON（没有 { 或 [ ）") };
    try {
      return { ok: true, value: JSON.parse(cand), source: "extracted", candidate: cand, jsonTextUsed: cand };
    } catch (e2) {
      try {
        const fixedCand = escapeControlCharsInsideJsonStrings(cand);
        return { ok: true, value: JSON.parse(fixedCand), source: "extracted+escape", candidate: cand, jsonTextUsed: fixedCand };
      } catch (e2b) {
        return { ok: false, error: e2b, candidate: cand };
      }
    }
  }

  function describeJson(val) {
    if (Array.isArray(val)) return `type: Array, length: ${val.length}`;
    if (val !== null && typeof val === "object") return `type: Object`;
    return `type: ${typeof val}`;
  }

  // ============= 2) 换行渲染：左右选区字符映射 =============
  function buildNlMapping(raw) {
    const src = String(raw ?? "");
    let rendered = "";
    const mapSrcToDst = new Array(src.length + 1);
    let mapDstToSrc = []; // let：后面需要重新赋值

    let si = 0, di = 0;
    while (si < src.length) {
      mapSrcToDst[si] = di;
      const ch = src[si];

      // 字面量 \t
      if (ch === "\\" && src.slice(si, si + 2) === "\\t") {
        mapSrcToDst[si + 1] = di;
        si += 2;
        continue;
      }
      // 真实 tab
      if (ch === "\t") {
        si += 1;
        continue;
      }
      // 字面量 \r\n
      if (ch === "\\" && src.slice(si, si + 4) === "\\r\\n") {
        rendered += "\n";
        mapSrcToDst[si + 1] = di;
        mapSrcToDst[si + 2] = di;
        mapSrcToDst[si + 3] = di;
        mapDstToSrc[di] = si;
        si += 4; di += 1;
        continue;
      }
      // 字面量 \n
      if (ch === "\\" && src.slice(si, si + 2) === "\\n") {
        rendered += "\n";
        mapSrcToDst[si + 1] = di;
        mapDstToSrc[di] = si;
        si += 2; di += 1;
        continue;
      }
      // 字面量 \r
      if (ch === "\\" && src.slice(si, si + 2) === "\\r") {
        rendered += "\n";
        mapSrcToDst[si + 1] = di;
        mapDstToSrc[di] = si;
        si += 2; di += 1;
        continue;
      }
      // 真实换行统一：\r\n / \r -> \n
      if (ch === "\r") {
        if (src[si + 1] === "\n") {
          rendered += "\n";
          mapSrcToDst[si + 1] = di;
          mapDstToSrc[di] = si;
          si += 2; di += 1;
          continue;
        }
        rendered += "\n";
        mapDstToSrc[di] = si;
        si += 1; di += 1;
        continue;
      }
      // 普通字符
      rendered += ch;
      mapDstToSrc[di] = si;
      si += 1; di += 1;
    }
    mapSrcToDst[src.length] = di;
    mapDstToSrc[rendered.length] = src.length;

    // 空白行清理：重建映射
    {
      const lines = rendered.split("\n");
      // 只含空格/tab的行标记为需删除
      const lineIsBlank = lines.map(l => /^[ \t]+$/.test(l));

      const newMapDstToSrc = [];
      let newRendered = "";
      let charIdx = 0;
      let newI = 0;

      for (let li = 0; li < lines.length; li++) {
        const line = lines[li];
        if (lineIsBlank[li]) {
          // 跳过空白行的空格字符，不写入 newRendered
          charIdx += line.length;
          // 换行符本身仍保留（最后一行除外）
          if (li < lines.length - 1) {
            newMapDstToSrc[newI] = mapDstToSrc[charIdx] ?? 0;
            newRendered += "\n";
            newI++;
            charIdx++; // 跳过 \n
          }
        } else {
          // 正常行：逐字符保留
          for (let ci = 0; ci < line.length; ci++) {
            newMapDstToSrc[newI] = mapDstToSrc[charIdx] ?? 0;
            newRendered += line[ci];
            newI++; charIdx++;
          }
          // 保留换行符（最后一行除外）
          if (li < lines.length - 1) {
            newMapDstToSrc[newI] = mapDstToSrc[charIdx] ?? 0;
            newRendered += "\n";
            newI++; charIdx++;
          }
        }
      }
      newMapDstToSrc[newI] = src.length;

      // 重建 mapSrcToDst：反向推导 src -> newDst
      const srcToNewDst = new Array(src.length + 1).fill(newI);
      for (let nd = newI; nd >= 0; nd--) {
        const sv = newMapDstToSrc[nd] ?? src.length;
        srcToNewDst[Math.min(sv, src.length)] = nd;
      }
      // 前向填充：对没有直接映射的 src 位置，沿用上一个有效值
      let lastNewDst = 0;
      for (let sv = 0; sv <= src.length; sv++) {
        if (srcToNewDst[sv] !== newI) {
          lastNewDst = srcToNewDst[sv];
        } else {
          srcToNewDst[sv] = lastNewDst;
        }
      }

      // ✅ 修正：去掉原先那个空循环体的死代码，直接赋值
      mapDstToSrc = newMapDstToSrc;
      rendered = newRendered;
      for (let sv = 0; sv <= src.length; sv++) {
        mapSrcToDst[sv] = srcToNewDst[sv];
      }
    }

    // 压缩连续换行
    const compressedResult = compressNewlines(rendered, mapDstToSrc, mapSrcToDst, src.length);

    return {
      rendered: compressedResult.rendered,
      mapSrcToDst: compressedResult.mapSrcToDst,
      mapDstToSrc: compressedResult.mapDstToSrc
    };
  }

  // 辅助函数：压缩连续换行，并重建映射
  function compressNewlines(rendered, mapDstToSrc, mapSrcToDst, srcLen) {
    let newRendered = "";
    const newMapDstToSrc = [];
    const oldDstToNewDst = new Array(rendered.length + 1);

    let i = 0, ni = 0;
    while (i < rendered.length) {
      if (rendered[i] === "\n") {
        let j = i;
        while (j < rendered.length && rendered[j] === "\n") { j++; }
        const count = j - i;

        if (count >= 3) {
          // ✅ 修正：补上 oldDstToNewDst[j] 的赋值，避免后续重建 mapSrcToDst 时访问到 undefined
          for (let k = i; k < j; k++) oldDstToNewDst[k] = ni;
          oldDstToNewDst[j] = ni; // ✅ 补上结束位置
          newMapDstToSrc[ni] = mapDstToSrc[i] ?? 0;
          newRendered += "\n"; ni++;
          newMapDstToSrc[ni] = mapDstToSrc[i] ?? 0;
          newRendered += "\n"; ni++;
        } else {
          for (let k = i; k < j; k++) {
            oldDstToNewDst[k] = ni;
            newMapDstToSrc[ni] = mapDstToSrc[k] ?? 0;
            newRendered += "\n"; ni++;
          }
        }
        i = j;
      } else {
        oldDstToNewDst[i] = ni;
        newMapDstToSrc[ni] = mapDstToSrc[i] ?? 0;
        newRendered += rendered[i];
        i++; ni++;
      }
    }
    oldDstToNewDst[rendered.length] = ni;
    newMapDstToSrc[ni] = mapDstToSrc[rendered.length] ?? srcLen;

    // 重建 mapSrcToDst
    const newMapSrcToDst = new Array(srcLen + 1);
    for (let s = 0; s <= srcLen; s++) {
      const oldDst = mapSrcToDst[s] ?? 0;
      newMapSrcToDst[s] = oldDstToNewDst[Math.min(oldDst, rendered.length)] ?? ni;
    }

    return {
      rendered: newRendered,
      mapDstToSrc: newMapDstToSrc,
      mapSrcToDst: newMapSrcToDst
    };
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function applyMarkToText(text, start, end) {
    const s = Math.max(0, Math.min(text.length, start));
    const e = Math.max(0, Math.min(text.length, end));
    if (e <= s) return escapeHtml(text);
    return escapeHtml(text.slice(0, s)) +
      "<mark>" + escapeHtml(text.slice(s, e)) + "</mark>" +
      escapeHtml(text.slice(e));
  }

  let lastNl = {
    raw: "",
    rendered: "",
    mapSrcToDst: null,
    mapDstToSrc: null,
    highlightRaw: null,
    highlightRendered: null
  };

  function setRightHtml(html) { outEl.innerHTML = html; }
  function getTextareaSelection(el) { return { start: el.selectionStart ?? 0, end: el.selectionEnd ?? 0 }; }
  function setTextareaSelection(el, start, end) { el.focus(); el.setSelectionRange(start, end); }

  // ============= 3) JSON解析：key 粒度联动 =============
  let lastJson = {
    ok: false,
    pretty: "",
    jsonTextUsed: "",
    keysToLineIndex: new Map(),
    lines: []
  };

  function buildJsonKeyIndex(prettyText) {
    const lines = prettyText.split("\n");
    const map = new Map();
    const keyRe = /^\s*"([^"]+)"\s*:\s*/;
    for (let i = 0; i < lines.length; i++) {
      const m = lines[i].match(keyRe);
      if (m && !map.has(m[1])) map.set(m[1], i);
    }
    return { lines, map };
  }

  function highlightJsonLine(prettyText, lineIndex) {
    const lines = prettyText.split("\n");
    if (lineIndex < 0 || lineIndex >= lines.length) return escapeHtml(prettyText);
    lines[lineIndex] = "<mark>" + escapeHtml(lines[lineIndex]) + "</mark>";
    for (let i = 0; i < lines.length; i++) {
      if (i !== lineIndex) lines[i] = escapeHtml(lines[i]);
    }
    return lines.join("\n");
  }

  function findKeyNearCursorInPretty(prettyText, cursorIndex) {
    const before = prettyText.slice(0, cursorIndex);
    const line = before.split("\n").length - 1;
    const lines = prettyText.split("\n");
    const keyRe = /^\s*"([^"]+)"\s*:\s*/;
    const m = (lines[line] || "").match(keyRe);
    return m ? { key: m[1], line } : null;
  }

  function findFirstOccurrenceInRaw(raw, needle) {
    const s = String(raw ?? "");
    const i = s.indexOf(needle);
    return i >= 0 ? i : -1;
  }

  // ============= 4) 历史记录（localStorage, 15天）=============
  const HISTORY_KEY = "newline_tool_history_v1";
  const HISTORY_DAYS = 15;
  const HISTORY_MAX_ITEMS = 200;

  function nowTs() { return Date.now(); }
  function tsToString(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function loadHistory() {
    try {
      const s = localStorage.getItem(HISTORY_KEY);
      if (!s) return [];
      const arr = JSON.parse(s);
      return Array.isArray(arr) ? arr : [];
    } catch { return []; }
  }

  function saveHistory(arr) { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr)); }

  function pruneHistory(arr) {
    const cutoff = nowTs() - HISTORY_DAYS * 24 * 3600 * 1000;
    arr = arr.filter(x => x && typeof x.ts === "number" && x.ts >= cutoff && typeof x.text === "string");
    arr.sort((a,b) => b.ts - a.ts);
    if (arr.length > HISTORY_MAX_ITEMS) arr = arr.slice(0, HISTORY_MAX_ITEMS);
    return arr;
  }

  function addToHistory(text) {
    const t = String(text ?? "");
    if (!t.trim()) return;
    let arr = pruneHistory(loadHistory());
    if (arr[0] && arr[0].text === t) return;
    arr.unshift({ ts: nowTs(), text: t });
    arr = pruneHistory(arr);
    saveHistory(arr);
    renderHistoryPanel();
  }

  function renderHistoryPanel() {
    const arr = pruneHistory(loadHistory());
    if (arr.length === 0) {
      historyPanel.innerHTML = `<div class="hint">暂无往期数据</div>`;
      return;
    }
    historyPanel.innerHTML = arr.map((x, idx) => {
      const preview = escapeHtml(x.text.slice(0, 120)).replaceAll("\n", "\\n");
      return `
        <div style="display:flex; gap:8px; align-items:center; padding:6px 4px; border-bottom:1px dashed #eee;">
          <button data-act="load" data-idx="${idx}">加载</button>
          <button data-act="del" data-idx="${idx}">删除</button>
          <div style="flex:1; min-width:0;">
            <div style="font-size:12px; color:#333;">${tsToString(x.ts)}</div>
            <div style="font-size:12px; color:#666; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${preview}</div>
          </div>
        </div>
      `;
    }).join("");
  }

  historyPanel.addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    const act = btn.dataset.act;
    const idx = Number(btn.dataset.idx);
    let arr = pruneHistory(loadHistory());
    if (!Number.isFinite(idx) || idx < 0 || idx >= arr.length) return;
    if (act === "load") {
      rawEl.value = arr[idx].text;
      update(true);
      rawEl.focus();
    } else if (act === "del") {
      arr.splice(idx, 1);
      saveHistory(pruneHistory(arr));
      renderHistoryPanel();
    }
  });

  btnToggleHistory.addEventListener("click", () => {
    historyPanel.style.display = (historyPanel.style.display === "none") ? "block" : "none";
    if (historyPanel.style.display === "block") renderHistoryPanel();
  });

  btnClearHistory.addEventListener("click", ()=> {
    localStorage.removeItem(HISTORY_KEY);
    renderHistoryPanel();
  });

  // 输入节流保存历史：停止输入 800ms 认为一条
  let histTimer = null;
  function scheduleHistorySave() {
    if (histTimer) clearTimeout(histTimer);
    histTimer = setTimeout(() => addToHistory(rawEl.value), 800);
  }

  // ============= 5) 主渲染 + 联动逻辑 ==============
  function update(keepSelection = false) {
    const raw = rawEl.value ?? "";
    rawInfo.textContent = `字符数：${raw.length}`;

    if (mode === "nl") {
      const { rendered, mapSrcToDst, mapDstToSrc } = buildNlMapping(raw);
      lastNl.raw = raw;
      lastNl.rendered = rendered;
      lastNl.mapSrcToDst = mapSrcToDst;
      lastNl.mapDstToSrc = mapDstToSrc;

      if (lastNl.highlightRendered) {
        setRightHtml(applyMarkToText(rendered, lastNl.highlightRendered.start, lastNl.highlightRendered.end));
      } else {
        outEl.textContent = rendered;
      }
      return;
    }

    // JSON 模式
    const res = tryParseJson(raw);
    if (!res.ok) {
      outEl.innerHTML =
        `<div class="error">JSON 解析失败：${String(res.error)}`
        + (res.candidate ? `\n\n候选片段(截取)：\n${escapeHtml(res.candidate)}` : "")
        + `</div>`;
      lastJson.ok = false;
      lastJson.pretty = "";
      lastJson.jsonTextUsed = "";
      lastJson.keysToLineIndex = new Map();
      lastJson.lines = [];
      return;
    }

    const pretty = JSON.stringify(res.value, null, 2) + `\n\n/* ${describeJson(res.value)}, source: ${res.source} */`;
    lastJson.ok = true;
    lastJson.pretty = pretty;
    lastJson.jsonTextUsed = res.jsonTextUsed || "";
    const idxObj = buildJsonKeyIndex(JSON.stringify(res.value, null, 2));
    lastJson.keysToLineIndex = idxObj.map;
    lastJson.lines = idxObj.lines;

    outEl.textContent = pretty;
  }

  // ---- 5.1 换行模式：左 -> 右 选区同步高亮
  rawEl.addEventListener("select", () => {
    if (mode !== "nl") return;
    const sel = getTextareaSelection(rawEl);
    const m = lastNl.mapSrcToDst;
    if (!m) return;
    const rs = m[Math.min(sel.start, m.length - 1)] ?? 0;
    const re = m[Math.min(sel.end, m.length - 1)] ?? rs;
    lastNl.highlightRendered = { start: rs, end: re };
    setRightHtml(applyMarkToText(lastNl.rendered, rs, re));
  });

  // ---- 5.2 换行模式：右 -> 左
  function getRightSelectionText() {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return "";
    return sel.toString();
  }

  outEl.addEventListener("mouseup", () => {
    if (mode !== "nl") return;
    const t = getRightSelectionText();
    if (!t) return;

    const start = lastNl.rendered.indexOf(t);
    if (start < 0) return;
    const end = start + t.length;

    const m2 = lastNl.mapDstToSrc;
    if (!m2) return;

    const ls = m2[Math.min(start, m2.length - 1)] ?? 0;
    const le = m2[Math.min(end, m2.length - 1)] ?? ls;

    lastNl.highlightRendered = { start, end };
    setRightHtml(applyMarkToText(lastNl.rendered, start, end));
    setTextareaSelection(rawEl, ls, le);
  });

  // ---- 5.3 JSON模式：右 -> 左
  outEl.addEventListener("mouseup", () => {
    if (mode !== "json") return;
    if (!lastJson.ok) return;

    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;

    const picked = sel.toString();
    if (!picked) return;

    const idx = lastJson.pretty.indexOf(picked);
    const cursor = idx >= 0 ? idx : 0;

    const purePretty = lastJson.lines.join("\n");
    const cursor2 = Math.min(cursor, purePretty.length);
    const keyInfo = findKeyNearCursorInPretty(purePretty, cursor2);
    if (!keyInfo) return;

    const needle = `"${keyInfo.key}"`;
    const pos = findFirstOccurrenceInRaw(rawEl.value, needle);
    if (pos >= 0) setTextareaSelection(rawEl, pos, pos + needle.length);

    const highlighted = highlightJsonLine(purePretty, keyInfo.line);
    outEl.innerHTML = highlighted;
  });

  // ---- 5.4 JSON模式：左 -> 右
  rawEl.addEventListener("mouseup", () => {
    if (mode !== "json") return;
    if (!lastJson.ok) return;

    const sel = rawEl.value.slice(rawEl.selectionStart, rawEl.selectionEnd);
    const m = sel.match(/"([^"]+)"/);
    if (!m) return;
    const key = m[1];

    const line = lastJson.keysToLineIndex.get(key);
    if (line == null) return;

    const purePretty = lastJson.lines.join("\n");
    outEl.innerHTML = highlightJsonLine(purePretty, line);
  });

  // ============= 6) 事件：输入保存历史、tab切换、按钮 ==============
  rawEl.addEventListener("input", () => {
    lastNl.highlightRendered = null;
    scheduleHistorySave();
    update();
  });

  tabs.forEach(t => {
    t.addEventListener("click", () => {
      tabs.forEach(x => x.classList.remove("active"));
      t.classList.add("active");
      mode = t.dataset.mode;
      lastNl.highlightRendered = null;
      update();
    });
  });

  btnClear.addEventListener("click", () => {
    rawEl.value = "";
    lastNl.highlightRendered = null;
    update();
    rawEl.focus();
  });

  btnSampleText.addEventListener("click", () => {
    rawEl.value = String.raw`\r\nvisit_id: 40399510\r\n性别: 男\r\n年龄: 12\r\n科室: 骨外科门诊\r\n诊断结论: 腹痛`;
    addToHistory(rawEl.value);
    update();
    rawEl.focus();
  });

  btnSampleJsonObj.addEventListener("click", () => {
    rawEl.value =
`{
  "uniq_pid": "P001",
  "uniq_vid": "V001",
  "summary": "患者因【腹痛】于【2024年02月01日】在【门诊】就诊，最终诊断为【急性胃炎|胃食管反流】。"
}`;
    addToHistory(rawEl.value);
    update();
    rawEl.focus();
  });

  btnSampleJsonArr.addEventListener("click", () => {
    rawEl.value =
`[
  {"name": "肺癌", "time": "2018-06-28 15:26:10", "type": "门诊诊断"},
  {"name": "阻塞性肺气肿", "code": "J43.904", "time": "2018-06-28 16:16:08", "type": "门诊诊断"}
]`;
    addToHistory(rawEl.value);
    update();
    rawEl.focus();
  });

  btnCopyRight.addEventListener("click", async () => {
    const txt = outEl.textContent || "";
    try {
      await navigator.clipboard.writeText(txt);
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = txt;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }
  });

  // 初始渲染历史
  renderHistoryPanel();
  update();
</script>
</body>
</html>
